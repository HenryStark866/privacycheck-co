services:
  # --- FastAPI Application ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: habeas-check-api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-habeas_check}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - habeas-network

  # --- PostgreSQL Database ---
  postgres:
    image: postgres:16-alpine
    container_name: habeas-check-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-habeas_check}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-habeas_check}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - habeas-network

  # --- Redis Cache ---
  redis:
    image: redis:7-alpine
    container_name: habeas-check-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - habeas-network

  # --- Evolution API (WhatsApp) - Optional via profile ---
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: habeas-check-evolution
    profiles:
      - channels
    ports:
      - "${EVOLUTION_PORT:-8080}:8080"
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - habeas-network

  # --- Streamlit Dashboard ---
  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: habeas-check-dashboard
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - habeas-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  habeas-network:
    driver: bridge
